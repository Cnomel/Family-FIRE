name: family_fire
description: "家庭资产管理系统 — FIRE财务独立"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # HTTP
  dio: ^5.7.0

  # Security
  flutter_secure_storage: ^9.2.4

  # Local database (offline)
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Charts
  fl_chart: ^0.70.2

  # Graph visualization
  graphview: ^1.2.1

  # Document viewers
  pdfx: ^2.6.0
  photo_view: ^0.15.0

  # Biometric auth
  local_auth: ^2.3.0

  # QR code
  qr_flutter: ^4.1.0

  # File picking
  image_picker: ^1.1.2
  file_picker: ^8.1.7

  # Sharing
  share_plus: ^10.1.4

  # URL launching
  url_launcher: ^6.3.1

  # Internationalization
  intl: any

  # Image caching
  cached_network_image: ^3.4.1

  # Loading effects
  shimmer: ^3.0.0

  # Swipe actions
  flutter_slidable: ^3.1.1

  # WebSocket
  web_socket_channel: ^3.0.2

  # JSON serialization
  json_annotation: ^4.9.0

  # Icons
  cupertino_icons: ^1.0.8

  # UUID generation
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.2
  riverpod_lint: ^2.6.2
  build_runner: ^2.4.14
  drift_dev: ^2.24.0
  json_serializable: ^6.9.2
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  generate: true
